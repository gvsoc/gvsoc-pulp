from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('floonoc_v2')

    testset.new_make_test('default', flags='CASE=default',
                          build_resource='gvsoc.core.build', no_clean=True)
    testset.new_make_test('mem.4',   flags='CASE=mem.4',
                          build_resource='gvsoc.core.build', no_clean=True)
    testset.new_make_test('mem.8',   flags='CASE=mem.8',
                          build_resource='gvsoc.core.build', no_clean=True)
    testset.new_make_test('mem.64',  flags='CASE=mem.64',
                          build_resource='gvsoc.core.build', no_clean=True)
