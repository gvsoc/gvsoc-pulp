from gvtest.testsuite import *
import re


CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)
PCER_RX  = re.compile(r'^CALIB_PCER (\S+) (.*)$', re.MULTILINE)


def parse_pcer(output, name):
    for m in PCER_RX.finditer(output):
        if m.group(1) != name:
            continue
        return {kv.split('=')[0]: int(kv.split('=')[1])
                for kv in m.group(2).split()}
    return None


def check_delayed_load(test, output, *args, **kwargs):
    # Each (lw to slow mem, indep addi, dependent addi) trio costs
    # ~(slow_mem_latency + 2) cycles. The 1-instr window after the load
    # is absorbed by the independent addi; the dependent addi stalls
    # until the response arrives.
    # RTL measurement (slow_mem_latency=5): 448 cycles / 64 trios = 7.0.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    expected = 7 * 64
    for variant in ('delayed_load_fastmode', 'delayed_load_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - expected) > 15:
            return False, (f'{variant}: cycles={cycles}, expected ~{expected}; '
                           'trio is not 7 cycles/iter (L=5)')

    # PCER cross-check: each trio's dependent addi stalls multiple cycles
    # waiting for the slow-mem load, but RTL counts only the FIRST cycle
    # of each hazard (gated by id_valid_q). 64 trios → 64 events.
    pcer = parse_pcer(output, 'delayed_load')
    if pcer is None:
        return False, 'no CALIB_PCER delayed_load line in output'
    if pcer.get('ld_stall') != 64:
        return False, f'ld_stall PCER counter: {pcer.get("ld_stall")} (expected 64)'

    return True, (f'delayed_load: fastmode={results["delayed_load_fastmode"]} '
                  f'slowmode={results["delayed_load_slowmode"]} '
                  f'pcer.ld_stall={pcer["ld_stall"]}')


def testset_build(testset):
    testset.new_gvrun_test('delayed_load', checker=check_delayed_load)
