from gvtest.testsuite import *
import re


CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)
PCER_RX  = re.compile(r'^CALIB_PCER (\S+) (.*)$', re.MULTILINE)


def parse_pcer(output, name):
    for m in PCER_RX.finditer(output):
        if m.group(1) != name:
            continue
        return {kv.split('=')[0]: int(kv.split('=')[1])
                for kv in m.group(2).split()}
    return None


def check_load_use(test, output, *args, **kwargs):
    # Each (lw, addi-on-result) pair retires in 3 cycles: load + 1-cycle
    # scoreboard bubble + dependent addi.
    # RTL measurement: 384 cycles / 128 pairs → 3.0 cycles/pair.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    expected = 3 * 128
    for variant in ('load_use_fastmode', 'load_use_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - expected) > 10:
            return False, (f'{variant}: cycles={cycles}, expected ~{expected}; '
                           'pair is not 3 cycles/iter')

    # PCER cross-check: each pair has one load-use hazard, RTL fires
    # PCCR_LD_STALL once per hazard (one cycle of id_valid_q).
    pcer = parse_pcer(output, 'load_use')
    if pcer is None:
        return False, 'no CALIB_PCER load_use line in output'
    if pcer.get('ld_stall') != 128:
        return False, f'ld_stall PCER counter: {pcer.get("ld_stall")} (expected 128)'

    return True, (f'load_use: fastmode={results["load_use_fastmode"]} '
                  f'slowmode={results["load_use_slowmode"]} '
                  f'pcer.ld_stall={pcer["ld_stall"]}')


def testset_build(testset):
    testset.new_gvrun_test('load_use', checker=check_load_use)
