from gvtest.testsuite import *
import re


CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)
PCER_RX  = re.compile(r'^CALIB_PCER (\S+) (.*)$', re.MULTILINE)


def parse_pcer(output, name):
    for m in PCER_RX.finditer(output):
        if m.group(1) != name:
            continue
        return {kv.split('=')[0]: int(kv.split('=')[1])
                for kv in m.group(2).split()}
    return None


def check_elw(test, output, *args, **kwargs):
    # p.elw against the asynchronous slow memory (latency=5). RI5CY fully
    # serializes the elw in ELW_EXE: it pays the response latency plus a
    # 1-cycle pipeline refill, with no overlap. Per elw:
    #   total  = L + 2 = 7 cycles      (RTL 449 / 64 loads)
    #   PCCR_ELW = L + 1 = 6 cycles    (RTL 384 = perf_pipeline_stall_o)
    # Both match RTL exactly; GVSoC clock-gates the core for the wait and
    # charges the same wasted cycles to CSR_PCER_ELW.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    expected = 7 * 64
    for variant in ('elw_fastmode', 'elw_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - expected) > 15:
            return False, (f'{variant}: cycles={cycles}, expected ~{expected} '
                           '(elw = latency + 2 cycles each)')

    pcer = parse_pcer(output, 'elw')
    if pcer is None:
        return False, 'no CALIB_PCER elw line in output'
    # One bus access per elw.
    if pcer.get('ld') != 64:
        return False, f'ld PCER counter: {pcer.get("ld")} (expected 64)'
    # The ELW performance counter: L+1 = 6 wasted cycles per elw.
    if abs(pcer.get('elw', 0) - 6 * 64) > 8:
        return False, (f'elw PCER counter: {pcer.get("elw")} '
                       '(expected ~384, i.e. latency+1 per elw)')

    return True, (f'elw: fastmode={results["elw_fastmode"]} '
                  f'slowmode={results["elw_slowmode"]} '
                  f'pcer.elw={pcer["elw"]} pcer.ld={pcer["ld"]}')


def testset_build(testset):
    testset.new_gvrun_test('elw', checker=check_elw)
