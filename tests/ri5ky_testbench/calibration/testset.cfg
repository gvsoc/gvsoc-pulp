from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('calibration')

    if testset.get_target().get_name() != 'ri5ky_testbench':
        return

    testset.import_testset(file='pipelined_loads/testset.cfg')
    testset.import_testset(file='load_use/testset.cfg')
    testset.import_testset(file='delayed_load/testset.cfg')
    testset.import_testset(file='branch_taken/testset.cfg')
    testset.import_testset(file='jr_stall/testset.cfg')
    testset.import_testset(file='mulh_latency/testset.cfg')
    testset.import_testset(file='div_latency/testset.cfg')
    testset.import_testset(file='misaligned_load/testset.cfg')
