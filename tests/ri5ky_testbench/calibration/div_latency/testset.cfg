from gvtest.testsuite import *
import re

CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)


# Expected per-block cycle counts measured on the RI5CY Verilator RTL.
# Formula: per-div ~= 3 + clz(divisor) (32 if divisor==0). Independent
# and dependent blocks land within one cycle of each other because the
# dependent block adds a single `mv t0, %0` seed instruction. div /
# divu / rem all share the same FSM and the same cost for a given
# divisor.
EXPECTED = {
    'main': 307,   # b=0x9876,     clz=16 → 19 cyc/div * 16 = 304 + 3 bracket
    'one':  547,   # b=1,          clz=31 → 34 cyc/div
    'msb':  67,    # b=0x40000000, clz=1  → 4  cyc/div
    'zero': 563,   # b=0,         (clz=32 → 35 cyc/div, special-case path)
    'divu': 307,   # b=0x9876,     unsigned variant — same cost as signed div
    'rem':  307,   # b=0x9876,     remainder variant — same cost as signed div
}

# Tolerance: ±10 cycles, generous enough to absorb the dep/indep delta
# plus the bracketing overhead. We tighten if we ever care.
TOL = 10


def check(test, output, *args, **kwargs):
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    for case, expected in EXPECTED.items():
        for chain in ('indep', 'dep'):
            # `divu` and `rem` only run in the independent variant.
            if case in ('divu', 'rem') and chain == 'dep':
                continue
            for mode in ('fastmode', 'slowmode'):
                name = f'div_latency_{case}_{chain}_{mode}'
                if name not in results:
                    return False, f'no CALIB {name} line in output'
                cycles = results[name]
                if abs(cycles - expected) > TOL:
                    return False, (f'{name}: cycles={cycles}, '
                                   f'expected ~{expected}')
    return True, 'div_latency: ' + ' '.join(
        f'{k.removeprefix("div_latency_")}={v}'
        for k, v in sorted(results.items()))


def testset_build(testset):
    # RTL-only: iss_v2 treats div as a single-cycle ALU op, so cycles
    # don't match the RTL multi-cycle FSM.
    if testset.get_property('platform') != 'rtl':
        return
    testset.new_gvrun_test('div_latency', checker=check)
