from gvtest.testsuite import *
import re

CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)
PCER_RX  = re.compile(r'^CALIB_PCER (\S+) (.*)$', re.MULTILINE)


def parse_pcer(output, name):
    for m in PCER_RX.finditer(output):
        if m.group(1) != name:
            continue
        return {kv.split('=')[0]: int(kv.split('=')[1])
                for kv in m.group(2).split()}
    return None


def check(test, output, *args, **kwargs):
    # Always-taken branches: each one flushes the prefetch buffer.
    # The asm block is .p2align 4 so RI5CY's prefetcher consistently
    # has the next branch target ready and PCCR_IMISS stays at 0
    # (without the alignment, the count flips between 0 and 128
    # depending on how much code precedes the asm).
    # RTL measurement (free-running mcycle): ~387 cycles / 128 ~= 3.0
    # cycles/taken-branch (the +2 over 385 is the .p2align padding).
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    for variant in ('branch_taken_fastmode', 'branch_taken_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - 387) > 15:
            return False, f'{variant}: cycles={cycles}, expected ~387'

    # PCER cross-check: with the asm block aligned, PCCR_IMISS stays 0
    # on RTL — same as GVSoC's prefetch model.
    pcer = parse_pcer(output, 'branch_taken')
    if pcer is None:
        return False, 'no CALIB_PCER branch_taken line in output'
    if pcer.get('imiss') != 0:
        return False, f'imiss PCER counter: {pcer.get("imiss")} (expected 0; alignment lost?)'
    if pcer.get('btaken') != 128:
        return False, f'btaken PCER counter: {pcer.get("btaken")} (expected 128)'

    return True, (f'branch_taken: fastmode={results["branch_taken_fastmode"]} '
                  f'slowmode={results["branch_taken_slowmode"]} '
                  f'pcer.imiss={pcer["imiss"]} pcer.btaken={pcer["btaken"]}')


def testset_build(testset):
    # Runs on both platforms: Ri5kyEvents charges the 2-cycle pipeline
    # bubble after every taken branch, matching the RI5CY controller's
    # PC redirect path (riscv_controller.sv:410-417).
    testset.new_gvrun_test('branch_taken', checker=check)
