from gvtest.testsuite import *
import re

CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)


def check(test, output, *args, **kwargs):
    # (auipc, addi t0, jalr t0) trio. The jalr's source register has
    # just been written by the addi, so the RI5CY controller raises
    # jr_stall_o (one cycle while the forward path drains) on top of
    # the taken-jump pipeline flush. Per trio: 1 + 1 + (1 + 1 flush +
    # 1 jr_stall) = 5 cycles.
    #   RTL measurement: 161 cycles / 32 = 5.03 cycles/trio.
    #
    # Both modes must match: slow mode exercises the cycle-accurate
    # exec path; fast mode requires event_retire_account to fire from
    # exec_instr so prev_dest_reg is tracked for the jalr hazard.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    for variant in ('jr_stall_fastmode', 'jr_stall_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - 161) > 10:
            return False, f'{variant}: cycles={cycles}, expected ~161'
    return True, (f'jr_stall: fastmode={results["jr_stall_fastmode"]} '
                  f'slowmode={results["jr_stall_slowmode"]}')


def testset_build(testset):
    # Runs on both platforms now that Ri5kyEvents charges the
    # taken-jump flush + jr_stall hazard the same way the RI5CY
    # controller does.
    testset.new_gvrun_test('jr_stall', checker=check)
