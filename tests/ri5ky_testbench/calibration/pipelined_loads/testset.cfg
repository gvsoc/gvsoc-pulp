from gvtest.testsuite import *
import re


CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)


def check_pipelined_loads(test, output, *args, **kwargs):
    # RI5CY pipelines one independent load per cycle when the response
    # arrives the next cycle and the result is not consumed immediately.
    # RTL measurement: ~256 cycles / 256 loads → 1.0 cycle/load.
    #
    # Two variants: fast (PCMR off, GVSoC functional exec) and slow
    # (PCMR on, GVSoC cycle-accurate exec). Loads have no jr_stall/
    # event_retire_account dependency, so both modes match the RTL.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    for variant in ('pipelined_loads_fastmode', 'pipelined_loads_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - 256) > 10:
            return False, (f'{variant}: cycles={cycles}, expected ~256; '
                           'load is not 1 cycle/iter')
    return True, (f'pipelined_loads: fastmode={results["pipelined_loads_fastmode"]} '
                  f'slowmode={results["pipelined_loads_slowmode"]}')


def testset_build(testset):
    testset.new_gvrun_test('pipelined_loads', checker=check_pipelined_loads)
