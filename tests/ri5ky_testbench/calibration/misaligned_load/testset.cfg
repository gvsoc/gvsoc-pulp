from gvtest.testsuite import *
import re

CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)
PCER_RX  = re.compile(r'^CALIB_PCER (\S+) (.*)$', re.MULTILINE)


def parse_pcer(output, name):
    for m in PCER_RX.finditer(output):
        if m.group(1) != name:
            continue
        return {kv.split('=')[0]: int(kv.split('=')[1])
                for kv in m.group(2).split()}
    return None


def check(test, output, *args, **kwargs):
    # Word loads that straddle a 4-byte boundary. The RI5CY LSU (and
    # iss_v2 LsuV2 since the split-access fix) issues two aligned word
    # beats, each paying the underlying memory latency.
    #
    # Fast mem (latency=1): ~256 cycles for 128 loads (2 cycles/lw).
    # Slow mem (latency=5): the slow region is now the asynchronous
    # Ri5kyAsyncMem (grants, replies L cycles later), so each of the two
    # aligned beats parks separately — ~1409 cycles for 128 loads (11
    # cycles/lw). RTL slow_mem is async too, but RTL misaligned_load does
    # not currently terminate, so the slowmem figure is GVSoC-only.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    expectations = {
        'misaligned_load_fastmem_fastmode': (256, 15),
        'misaligned_load_fastmem_slowmode': (256, 15),
        'misaligned_load_slowmem_fastmode': (1409, 20),
        'misaligned_load_slowmem_slowmode': (1409, 20),
    }
    for variant, (expected, tol) in expectations.items():
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - expected) > tol:
            return False, f'{variant}: cycles={cycles}, expected ~{expected}'
    # PCER cross-check: PCCR_LD pulses once per bus access, so 128
    # misaligned lw → 2 beats each → 256. PCCR_ST has no in-asm stores;
    # the small +/- in the report is compiler-emitted (printf etc.).
    pcer = parse_pcer(output, 'misaligned_load')
    if pcer is None:
        return False, 'no CALIB_PCER misaligned_load line in output'
    if pcer.get('ld') != 256:
        return False, f'ld PCER counter: {pcer.get("ld")} (expected 256, i.e. 2 beats per misaligned lw)'

    return True, ('misaligned_load: ' + ' '.join(
        f'{k.split("_", 2)[2]}={v}' for k, v in results.items())
        + f' pcer.ld={pcer["ld"]}')


def testset_build(testset):
    # Now runs on both platforms. iss_v2 LsuV2 splits misaligned word
    # accesses into two sequential aligned beats, matching the RI5CY
    # LSU behaviour within a few cycles.
    testset.new_gvrun_test('misaligned_load', checker=check)
