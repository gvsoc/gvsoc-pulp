from gvtest.testsuite import *
import re

CALIB_RX = re.compile(r'^CALIB (\S+) cycles=(\d+) iters=(\d+)\s*$', re.MULTILINE)


def check(test, output, *args, **kwargs):
    # Back-to-back `mulh` instructions. The RTL multiplier walks a
    # 4-step FSM (STEP0/STEP1/STEP2/FINISH) behind a structurally
    # serialised issue port, so each MULH retires in ~5 cycles
    # regardless of whether the follower depends on the result.
    #   RTL measurement: 323 cycles / 64 = ~5.05 cyc/MULH (both blocks).
    #
    # Both indep / dep blocks must match — that's the discriminator
    # against a scoreboard-only model, which would let the independent
    # chain drop to ~1 cyc/MULH while keeping the dependent one at ~5.
    results = {m.group(1): int(m.group(2))
               for m in CALIB_RX.finditer(output)}
    for variant in ('mulh_latency_indep_fastmode',
                    'mulh_latency_indep_slowmode',
                    'mulh_latency_dep_fastmode',
                    'mulh_latency_dep_slowmode'):
        if variant not in results:
            return False, f'no CALIB {variant} line in output'
        cycles = results[variant]
        if abs(cycles - 323) > 15:
            return False, f'{variant}: cycles={cycles}, expected ~323'
    return True, ('mulh_latency: '
                  f'indep_fastmode={results["mulh_latency_indep_fastmode"]} '
                  f'indep_slowmode={results["mulh_latency_indep_slowmode"]} '
                  f'dep_fastmode={results["mulh_latency_dep_fastmode"]} '
                  f'dep_slowmode={results["mulh_latency_dep_slowmode"]}')


def testset_build(testset):
    # Runs on both platforms now that Ri5ky::start() tags MULH/MULHU/MULHSU
    # with latency=4 and Ri5kyEvents::event_insn_latency_account turns it
    # into an unconditional stall, matching the RI5CY FSM.
    testset.new_gvrun_test('mulh_latency', checker=check)
