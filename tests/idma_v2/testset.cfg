from gvtest.testsuite import *

import re


PASS_RX = re.compile(
    r'^\[\d+\] tester PASS idma_cycles=(\d+) bytes=(\d+) bw_x1000=(\d+)\b',
    re.MULTILINE)
FAIL_RX = re.compile(r'^\[\d+\] tester FAIL .*$', re.MULTILINE)


def _check_pass(test, output, *args, **kwargs):
    if PASS_RX.search(output):
        return True, 'tester PASS observed'
    fail = FAIL_RX.search(output)
    if fail:
        return False, fail.group(0)
    return False, 'no tester PASS / FAIL line in output'


def _make_check_cycles(expected, tolerance):
    """Return a checker that asserts idma_cycles is in [expected-tol, expected+tol]
    AND the run passed.
    """
    lo, hi = expected - tolerance, expected + tolerance

    def _check(test, output, *args, **kwargs):
        m = PASS_RX.search(output)
        if not m:
            fail = FAIL_RX.search(output)
            return False, fail.group(0) if fail else 'no tester PASS line'
        cycles = int(m.group(1))
        if not (lo <= cycles <= hi):
            return False, (f'idma_cycles={cycles} outside [{lo},{hi}] '
                           f'(expected ~{expected})')
        return True, f'idma_cycles={cycles} (expected {expected} +/- {tolerance})'

    return _check


def _add(testset, name, *, description, expected_cycles=None, tolerance=10):
    if expected_cycles is None:
        checker = _check_pass
    else:
        checker = _make_check_cycles(expected_cycles, tolerance)
    t = testset.new_make_test(name, flags=f'CASE={name}',
                              checker=checker,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(description)
    return t


def testset_build(testset):
    testset.set_name('idma_v2')
    testset.set_components(['pulp.idma_v2.reg_dma'])

    # Cycle expectations are derived from the iDMA + router_v2_bandwidth
    # latency model, with the source memory preloaded via stim_file so the
    # tester's mem_master traffic does not contend with the iDMA on the
    # shared router. For the 1D bandwidth-limited cases:
    #
    #   idma_cycles ~= ceil(bytes / router_bandwidth)
    #                + router_latency + mem_latency + iDMA_pipeline_overhead
    #
    # The ~2-cycle iDMA pipeline overhead is the cost of the BE FSM tick
    # between read-burst issue, latency-driven wait, and write-burst issue.

    _add(testset, '1d_small',
         expected_cycles=13, tolerance=5,
         description=(
             "Smallest happy-path 1D copy: 64 B from mem_a to mem_b. The "
             "transfer is dominated by iDMA pipeline overhead rather than "
             "the bandwidth model (64/8 = 8 + ~5 = 13)."))

    _add(testset, '1d_line',
         expected_cycles=517, tolerance=5,
         description=(
             "4 KiB 1D copy that fits within one AXI page. Bandwidth-bound: "
             "4096/8 = 512 cycles + 1 router latency + 1 memory latency + "
             "~3 cycles iDMA pipeline = 517."))

    _add(testset, '1d_page_cross',
         expected_cycles=518, tolerance=5,
         description=(
             "4 KiB 1D copy starting 0x800 into a page so the iDMA must "
             "split into two 2 KiB AXI bursts. The two bursts pipeline "
             "through the router, so total is essentially the same as "
             "1d_line plus one extra cycle for the split."))

    _add(testset, '2d_basic',
         expected_cycles=268, tolerance=15,
         description=(
             "8 lines x 256 B (2048 B total) with 1 KiB strides. Each rep "
             "is one 256 B burst per direction. With axi_read and axi_write "
             "on separate router input ports, 8 reps pipeline freely. "
             "~8 * (256/8) = 256 cycles + a handful for the FE/ME/BE "
             "pipeline."))

    _add(testset, 'mem_to_tcdm',
         expected_cycles=389, tolerance=15,
         description=(
             "1 KiB AXI -> TCDM. Read is one 1 KiB burst (1024/8 + 2 = 130 "
             "cycles); writes are split into 128 x 8-byte lines through "
             "tcdm_junction (each ~2 cycles); read and writes pipeline."))

    _add(testset, 'tcdm_to_mem',
         expected_cycles=386, tolerance=15,
         description=(
             "1 KiB TCDM -> AXI. Mirror of mem_to_tcdm: 128 x 8-byte line "
             "reads from TCDM (~256 cycles total), then one 1 KiB AXI write "
             "burst (130 cycles)."))

    _add(testset, 'bw_4',
         expected_cycles=1029, tolerance=10,
         description=(
             "Same 4 KiB transfer as 1d_line but with router_bandwidth=4 "
             "(bytes/cycle). The bandwidth-limited part should double: "
             "4096/4 = 1024 + 1 + 1 + 3 = 1029 cycles. Validates the iDMA's "
             "latency tracking honors the slower router."))

    _add(testset, 'bw_16',
         expected_cycles=261, tolerance=10,
         description=(
             "Same transfer with router_bandwidth=16. Latency should "
             "halve: 4096/16 = 256 + 1 + 1 + 3 = 261. Validates scaling "
             "at the upper end."))

    _add(testset, 'lat_10',
         expected_cycles=526, tolerance=10,
         description=(
             "Same transfer with router_latency=10 instead of the default "
             "1. Adds 9 cycles per request hop. With one read going "
             "through the latency-aware path, total = 4096/8 + 10 + 1 + 3 "
             "= 526. Guards the iDMA's read_handle_req_end against "
             "regressions in latency annotation handling."))

    # ---- v2-specific async (IO_REQ_GRANTED + axi_response) coverage ----

    _add(testset, 'bp_1d_small',
         expected_cycles=7, tolerance=3,
         description=(
             "64 B 1D copy through router_v2_backpressure. Every request "
             "this router accepts returns IO_REQ_GRANTED and is later "
             "answered via resp(), so this case exercises the iDMA's "
             "axi_response async path that the v1 model never had. "
             "Single-burst, no DENIED."))

    _add(testset, 'bp_1d_line',
         expected_cycles=7, tolerance=3,
         description=(
             "4 KiB 1D copy through backpressure. Same async path as "
             "bp_1d_small. The backpressure router's first-request model "
             "doesn't charge bandwidth (only subsequent in-flight requests "
             "do), so the cycle count matches the small case — what we're "
             "guarding here is the GRANTED -> resp round trip handling, "
             "not bandwidth accounting."))

    # ---- Lifecycle / edge cases ----

    _add(testset, 'zero_size',
         expected_cycles=0, tolerance=2,
         description=(
             "length=0 -> the iDMA frontend acks the transfer inline "
             "without forwarding it to the middle-end. The IRQ should "
             "fire essentially the same cycle as the trigger reg-write, "
             "so idma_cycles ~ 0. Guards the early-ack path in "
             "IDmaFeReg::enqueue_copy and the granted=true fix that "
             "keeps the warning from becoming fatal under werror."))

    _add(testset, 'zero_reps_2d',
         expected_cycles=0, tolerance=2,
         description=(
             "2D config with reps=0 — symmetric edge case to zero_size. "
             "Same inline-ack path."))

    # ---- Multi-burst pipelining ----

    _add(testset, '1d_8k',
         expected_cycles=1030, tolerance=10,
         description=(
             "8 KiB 1D copy. AXI page is 4 KiB so the BE splits into two "
             "back-to-back 4 KiB bursts that share the input bandwidth "
             "watermark: 2 * 512 + ~6 = 1030 cycles. Exercises the "
             "burst-pool round trip and the iDMA's ability to pipeline "
             "successive bursts through one input."))

    _add(testset, '1d_16k',
         expected_cycles=2056, tolerance=15,
         description=(
             "16 KiB 1D copy = four 4 KiB bursts. Confirms cycle count "
             "scales linearly with the number of bursts: 4 * 512 + ~8 = "
             "2056. Stresses burst_queue_size=4 (every slot in flight "
             "at once) and the read-ahead pipeline."))

    # ---- v2 async + 2D pipelining (the v2 router's GRANTED handshake) ----

    _add(testset, 'bp_2d_basic',
         expected_cycles=238, tolerance=15,
         description=(
             "8 reps x 256 B through router_v2_backpressure. Every "
             "request returns IO_REQ_GRANTED + deferred resp(); read "
             "and write happen on separate router inputs (no "
             "DENIED-deadlock). Verifies the iDMA's FSM correctly "
             "drives reads back-to-back with the GRANTED async path "
             "and that resp arrival on either side resumes work."))

    # ---- DENIED + retry stress (multi-burst through backpressure) ----

    _add(testset, 'bp_1d_8k',
         expected_cycles=520, tolerance=15,
         description=(
             "8 KiB 1D copy through backpressure -> two 4 KiB bursts. "
             "The second read burst hits the router's one-pending-rule "
             "deny while the first is still in its deferred-forward "
             "window, so the iDMA's denied_blocked is actually set and "
             "axi_retry fires for real. First burst is bandwidth-free in "
             "the backpressure model, second pays 4096/8=512 cycles -> "
             "~520 total. Until the router fix that made send_handler "
             "call retry(), this case would deadlock."))

    _add(testset, 'bp_1d_16k',
         expected_cycles=1546, tolerance=20,
         description=(
             "16 KiB 1D copy through backpressure -> four 4 KiB bursts. "
             "Multiple denials and retries on both read and write inputs "
             "(traces show several 'AXI retry' events per direction). "
             "First burst free, three subsequent bursts at ~512 cycles "
             "each -> ~1541 cycles. Strongest stress on the iDMA's "
             "deny+retry handshake currently in the suite."))
